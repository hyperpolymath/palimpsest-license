name: Sign Release Artefacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sign:
    name: Sign release artefacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Build pmpl-sign
        run: |
          cd tools/pmpl-sign
          cargo build --release

      - name: Sign artefacts
        run: |
          mkdir -p signatures
          for file in dist/*; do
            echo "Signing $file"
            tools/pmpl-sign/target/release/pmpl-sign "$file" \
              --output "signatures/$(basename "$file").sig"
          done

      - name: Upload signatures
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: signatures/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
